        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #sticky-header {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: #000;
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 12px 0 14.5px;
            display: flex;
            justify-content: center;
            border-bottom: 1.5px solid #171717;
        }

        .header-container {
            width: 95%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .app-title {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-color);
            font-weight: 600;
        }

        /* ページネーション用のUI */
        #pagination {
            display: none; /* 複数ページの時だけ表示 */
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }
        
        .page-btn {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: none;
            border-radius: 7px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .page-btn:hover:not(:disabled) {
            background-color: var(--key-hover);
        }
        .page-btn:disabled {
            color: #555;
            cursor: default;
        }

        #info {
            font-size: 0.85rem;
            color: #888;
            display: flex;
            align-items: center;
        }

        #search-message {
            color: var(--text-color);
            margin-left: 10px;
        }

        #output-textbox {
            font-family: inherit;
            width: 100%;
            height: 70px;
            background-color: #151515;
            color: var(--text-color);
            border: none; /* 枠線なし */
            border-radius: 10px;
            margin-bottom: 3px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 1.5rem;
            resize: vertical;
            outline: none;
        }

        /* コントロール（ドロップダウンと検索ボックス）のコンテナ */
        .controls {
            display: flex;
            gap: 10px;
            align-items: stretch; /* 子要素の高さをコンテナに合わせる */
            height: 42px;         /* 高さを明示的に固定 */
        }

        /* --- カスタムドロップダウン (ブロック検索用) --- */
        .dropdown {
            position: relative;
            flex: 1.5;
            min-width: 0;
        }

        .dropdown-header {
            background-color: #151515;
            border: none;
            padding: 0 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            user-select: none;
            height: 100%;
            box-sizing: border-box;
        }

        .dropdown-header:hover {
            background-color: #1b1b1b;
        }

        #dropdown-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 長い場合は「...」にして改行しない */
            display: inline-block;
            max-width: calc(100% - 20px);
        }

        .dropdown-body {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            width: 100%;
            background-color: var(--input-bg);
            border: none;
            border-radius: 10px;
            max-height: 350px;
            flex-direction: column;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .dropdown-body.open {
            display: flex;
        }

        .dropdown-search {
            background-color: var(--input-bg);
            border: none;
            color: var(--text-color);
            padding: 12px;
            outline: none;
            font-size: 0.95rem;
            border-radius: 10px 10px 0 0;
        }

        .dropdown-list {
            list-style: none;
            margin: 0;
            padding: 0;
            overflow-y: auto;
            flex: 1;
        }

        .dropdown-list li {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
        }
        .dropdown-list li:hover {
            background-color: #1b1b1b;
        }

        /* --- 文字検索バー --- */
        .search-box {
            display: flex;
            flex: 1;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            background-color: var(--input-bg);
            height: 100%;
        }

        .search-box input {
            flex: 1;
            background-color: transparent;
            border: none;
            color: var(--text-color);
            padding: 0 12px;
            outline: none;
            font-size: 0.95rem;
            height: 100%;
            box-sizing: border-box;
        }

        .search-box button {
            background-color: #1b1b1b;
            color: var(--text-color);
            border: none;
            padding: 0 15px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background-color 0.1s;
            height: 100%;
        }

        .search-box button:hover {
            background-color: #222;
        }

        /* --- キーボードエリア --- */
        #keyboard-container {
            width: 95%;
            max-width: 800px;
            margin-top: 15px;
            margin-bottom: 40px;
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
            gap: 5px;
            padding: 12px;
            background-color: var(--panel-bg);
            border: none;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .key {
            background: radial-gradient(circle closest-side, #000, #121212);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-size: 1.5rem;
            aspect-ratio: 1;
            overflow: hidden;
            outline: 2px solid transparent;
            outline-offset: -2px;
            -webkit-touch-callout: none;
        }

        .key:hover {
            background: radial-gradient(circle closest-side, #121212, #121212);
        }

        .key:active {
            background: radial-gradient(circle closest-side, #222, #121212);
        }

        .key.highlighted {
            outline: 2px solid #ccc;
            outline-offset: -2px;
        }

        /* --- 拡大表示用オーバーレイ --- */
        #fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 5vh;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            font-size: 80vmin;
            line-height: 1;
            user-select: none;
        }
        
        #fullscreen-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* スマホ向け調整 */
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
                height: auto; /* スマホ時は折り返すので高さを自動に */
            }
            .dropdown-header, .search-box {
                min-height: 35px; /* 個別に高さを指定 */
            }
            #keyboard {
                grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
                gap: 4px;
                padding: 8px;
            }
            .key {
                font-size: 1.3rem;
            }
        }
        @media (orientation: portrait) {
            #fullscreen-overlay {
                padding-top: 25vh;
                font-size: 70vmin;
            }
        }        
    </style>
</head>
<body>

    <header id="sticky-header">
        <div class="header-container">
            <div class="top-info-bar">
                <h1 class="app-title">&nbsp;- Unibode -</h1>
                
                <!-- ページネーションUI (フリーズ対策用) -->
                <div id="pagination">
                    <button id="prev-page" class="page-btn">◀</button>
                    <span id="page-info">1 / 1</span>
                    <button id="next-page" class="page-btn">▶</button>
                </div>

                <div id="info">
                    <span id="char-count"></span>&nbsp;&nbsp;|&nbsp;&nbsp;<span id="codepoint-range"></span>
                    <span id="search-message"></span>
                </div>
            </div>

            <textarea id="output-textbox" placeholder=""></textarea>
            
            <div class="controls">
                <div class="dropdown" id="block-dropdown">
                    <div class="dropdown-header" id="dropdown-header">
                        <span id="dropdown-title">Loading...</span>
                        <span class="dropdown-arrow">▼</span>
                    </div>
                    <div class="dropdown-body" id="dropdown-body">
                        <input type="text" id="block-search" class="dropdown-search" placeholder="">
                        <ul class="dropdown-list" id="dropdown-list"></ul>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="char-search-input" placeholder="">
                    <button id="char-search-button">Find</button>
                </div>
            </div>
        </div>
    </header>

    <main id="keyboard-container">
        <div id="keyboard">
            <!-- キーボード生成エリア -->
        </div>
    </main>
    <!-- 拡大表示用オーバーレイ -->
    <div id="fullscreen-overlay"></div>

            { name: "装飾用絵記号 (Ornamental Dingbats)", start: 0x1F650, end: 0x1F67F },
            { name: "交通及び地図記号 (Transport and Map Symbols)", start: 0x1F680, end: 0x1F6FF },

            { name: "幾何学模様拡張 (Geometric Shapes Extended)", start: 0x1F780, end: 0x1F7FF },
            { name: "補助矢印C (Supplemental Arrows-C)", start: 0x1F800, end: 0x1F8FF },
            { name: "補助記号及び絵記号 (Supplemental Symbols and Pictographs)", start: 0x1F900, end: 0x1F9FF },
            { name: "チェス記号 (Chess Symbols)", start: 0x1FA00, end: 0x1FA6F },
            { name: "記号及び絵記号拡張A (Symbols and Pictographs Extended-A)", start: 0x1FA70, end: 0x1FAFF },
            { name: "旧型コンピュータ記号 (Symbols for Legacy Computing)", start: 0x1FB00, end: 0x1FBFF },
            { name: "CJK統合漢字拡張B (CJK Unified Ideographs Extension B)", start: 0x20000, end: 0x2A6DF },
            { name: "CJK統合漢字拡張C (CJK Unified Ideographs Extension C)", start: 0x2A700, end: 0x2B73F },
            { name: "CJK統合漢字拡張D (CJK Unified Ideographs Extension D)", start: 0x2B740, end: 0x2B81F },
            { name: "CJK統合漢字拡張E (CJK Unified Ideographs Extension E)", start: 0x2B820, end: 0x2CEAF },
            { name: "CJK統合漢字拡張F (CJK Unified Ideographs Extension F)", start: 0x2CEB0, end: 0x2EBEF },
            { name: "CJK統合漢字拡張I (CJK Unified Ideographs Extension I)", start: 0x2EBF0, end: 0x2EE5F },
            { name: "CJK互換漢字補助 (CJK Compatibility Ideographs Supplement)", start: 0x2F800, end: 0x2FA1F },
            { name: "CJK統合漢字拡張G (CJK Unified Ideographs Extension G)", start: 0x30000, end: 0x3134F },
            { name: "CJK統合漢字拡張H (CJK Unified Ideographs Extension H)", start: 0x31350, end: 0x323AF },
            { name: "タグ (Tags)", start: 0xE0000, end: 0xE007F },
            { name: "字形選択子補助 (Variation Selectors Supplement)", start: 0xE0100, end: 0xE01EF },
            { name: "補助私用領域A (Supplementary Private Use Area-A)", start: 0xF0000, end: 0xFFFFF },
            { name: "補助私用領域B (Supplementary Private Use Area-B)", start: 0x100000, end: 0x10FFFF },
        ];

        const outputTextbox = document.getElementById('output-textbox');
        const fullscreenOverlay = document.getElementById('fullscreen-overlay');
        let longPressTimer;
        fullscreenOverlay.addEventListener('click', () => {
            fullscreenOverlay.classList.remove('active');
        });
        const keyboardDiv = document.getElementById('keyboard');
        const charCountSpan = document.getElementById('char-count');
        const codepointRangeSpan = document.getElementById('codepoint-range');
        const searchMessageSpan = document.getElementById('search-message');
        
        const dropdownHeader = document.getElementById('dropdown-header');
        const dropdownBody = document.getElementById('dropdown-body');
        const dropdownTitle = document.getElementById('dropdown-title');
        const blockSearch = document.getElementById('block-search');
        const dropdownList = document.getElementById('dropdown-list');

        const charSearchInput = document.getElementById('char-search-input');
        const charSearchButton = document.getElementById('char-search-button');

        // フリーズ対策のページネーション状態
        const PAGE_SIZE = 2048; // 1ページあたりの最大文字数（DOMフリーズを防ぐ）
        let currentBlock = null;
        let currentPageIndex = 0;
        let highlightedKeyElement = null; 
        let currentSearchedCodePoint = null; 

        function renderDropdownList(filterText = "") {
            dropdownList.innerHTML = "";
            const lowerFilter = filterText.toLowerCase();
            
            unicodeBlocks.forEach((block) => {
                const startHex = block.start.toString(16).toUpperCase().padStart(4, '0');
                const endHex = block.end.toString(16).toUpperCase().padStart(4, '0');
                const blockLabel = `${block.name} (U+${startHex} - U+${endHex})`;
                
                if (blockLabel.toLowerCase().includes(lowerFilter)) {
                    const li = document.createElement('li');
                    li.textContent = blockLabel;
                    li.addEventListener('click', (e) => {
                        e.stopPropagation();
                        dropdownTitle.textContent = blockLabel;
                        dropdownBody.classList.remove('open');
                        
                        // ブロック選択時は最初のページを表示し、検索状態をリセット
                        currentBlock = block;
                        currentPageIndex = 0;
                        currentSearchedCodePoint = null;
                        renderKeyboard();
                    });
                    dropdownList.appendChild(li);
                }
            });
        }

        dropdownHeader.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownBody.classList.toggle('open');
            if (dropdownBody.classList.contains('open')) {
                blockSearch.focus();
            }
        });

        blockSearch.addEventListener('input', (e) => {
            renderDropdownList(e.target.value);
        });
        blockSearch.addEventListener('click', (e) => {
            e.stopPropagation(); 
        });

        document.addEventListener('click', (e) => {
            if (dropdownBody.classList.contains('open') && !dropdownBody.contains(e.target) && !dropdownHeader.contains(e.target)) {
                dropdownBody.classList.remove('open');
            }
        });

        // ページネーションに基づくキーボード描画（フリーズ防止）
        function renderKeyboard() {
            if (!currentBlock) return;

            const totalCharsInBlock = currentBlock.end - currentBlock.start + 1;
            const totalPages = Math.ceil(totalCharsInBlock / PAGE_SIZE);
            
            // 安全策（範囲外のページにアクセスしない）
            if (currentPageIndex >= totalPages) currentPageIndex = totalPages - 1;
            if (currentPageIndex < 0) currentPageIndex = 0;

            const startCodePoint = currentBlock.start + currentPageIndex * PAGE_SIZE;
            const endCodePoint = Math.min(currentBlock.start + (currentPageIndex + 1) * PAGE_SIZE - 1, currentBlock.end);

            // ページネーションUIの更新
            const paginationUI = document.getElementById('pagination');
            const infoUI = document.getElementById('info');
            if (totalPages > 1) {
                paginationUI.style.display = 'flex';
                infoUI.style.display = `none`;
                document.getElementById('page-info').textContent = `${currentPageIndex + 1} / ${totalPages}`;
                document.getElementById('prev-page').disabled = currentPageIndex === 0;
                document.getElementById('next-page').disabled = currentPageIndex === totalPages - 1;
            } else {
                paginationUI.style.display = 'none';
                infoUI.style.display = `block`;
                
            }

            keyboardDiv.innerHTML = ''; 
            let charCount = 0;
            highlightedKeyElement = null;

            const fragment = document.createDocumentFragment();

            for (let i = startCodePoint; i <= endCodePoint; i++) {
                try {
                    const char = String.fromCodePoint(i);
                    // 制御文字のスキップ
                    if (i < 0x0020 || (i >= 0x007F && i <= 0x009F) ) { 
                        if (i === 0x007F && currentBlock.start === 0x0000 && currentBlock.end === 0x007F) { 
                        } else {
                            continue; 
                        }
                    }

                    const key = document.createElement('div');
                    key.classList.add('key');
                    key.textContent = char;
                    key.title = `U+${i.toString(16).toUpperCase().padStart(4, '0')}`;
                    let isLongPress = false;

                    const startPress = (e) => {
                        if (e.type === 'mousedown' && e.button !== 0) return;
                        isLongPress = false;
                        longPressTimer = setTimeout(() => {
                            isLongPress = true;
                            fullscreenOverlay.textContent = char;
                            fullscreenOverlay.classList.add('active');
                        }, 500);
                    };

                    const cancelPress = () => {
                        clearTimeout(longPressTimer);
                    };

                    key.addEventListener('mousedown', startPress);
                    key.addEventListener('touchstart', startPress, { passive: true });

                    key.addEventListener('mouseup', cancelPress);
                    key.addEventListener('mouseleave', cancelPress);
                    key.addEventListener('touchend', cancelPress);
                    key.addEventListener('touchcancel', cancelPress);
                    
                    key.addEventListener('contextmenu', (e) => e.preventDefault());

                    key.addEventListener('click', (e) => {
                        if (isLongPress) {
                            e.preventDefault();
                            return;
                        }
                        const cursorPos = outputTextbox.selectionStart;
                        const textBefore = outputTextbox.value.substring(0, cursorPos);
                        const textAfter = outputTextbox.value.substring(outputTextbox.selectionEnd, outputTextbox.value.length);
                        outputTextbox.value = textBefore + char + textAfter;
                        outputTextbox.selectionStart = outputTextbox.selectionEnd = cursorPos + char.length; 
                        outputTextbox.focus();
                    });

                    if (currentSearchedCodePoint === i) { 
                        key.classList.add('highlighted');
                        highlightedKeyElement = key; 
                    }
                    fragment.appendChild(key);
                    charCount++;
                } catch (e) {}
            }
            
            keyboardDiv.appendChild(fragment); 
            charCountSpan.textContent = charCount;
            codepointRangeSpan.textContent = `U+${startCodePoint.toString(16).toUpperCase().padStart(4, '0')} - U+${endCodePoint.toString(16).toUpperCase().padStart(4, '0')}`;

            if (highlightedKeyElement) {
                setTimeout(() => {
                    highlightedKeyElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 50);
            }
        }

        // ページネーションのボタンイベント
        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                renderKeyboard();
            }
        });
        document.getElementById('next-page').addEventListener('click', () => {
            const totalPages = Math.ceil((currentBlock.end - currentBlock.start + 1) / PAGE_SIZE);
            if (currentPageIndex < totalPages - 1) {
                currentPageIndex++;
                renderKeyboard();
            }
        });
        
        // 検索機能
        function performSearch() {
            const query = charSearchInput.value.trim();
            if (!query) return;

            let targetCodePoint = -1;
            const chars = Array.from(query);

            if (query.toUpperCase().startsWith('U+')) {
                targetCodePoint = parseInt(query.substring(2), 16);
            } else if (chars.length === 1) {
                targetCodePoint = chars[0].codePointAt(0);
            } else if (/^[0-9a-fA-F]{2,6}$/.test(query)) {
                targetCodePoint = parseInt(query, 16);
            } else if (chars.length > 0) {
                targetCodePoint = chars[0].codePointAt(0);
            }

            if (isNaN(targetCodePoint) || targetCodePoint < 0 || targetCodePoint > 0x10FFFF) {
                currentSearchedCodePoint = null;
                if (highlightedKeyElement) {
                    highlightedKeyElement.classList.remove('highlighted');
                    highlightedKeyElement = null;
                }
                return;
            }

            currentSearchedCodePoint = targetCodePoint; 

            let foundBlock = null;
            for (let i = 0; i < unicodeBlocks.length; i++) {
                if (targetCodePoint >= unicodeBlocks[i].start && targetCodePoint <= unicodeBlocks[i].end) {
                    const isSurrogateBlock = (unicodeBlocks[i].start >= 0xD800 && unicodeBlocks[i].end <= 0xDFFF);
                    if (!isSurrogateBlock) {
                        foundBlock = unicodeBlocks[i];
                        break;
                    }
                }
            }

            if (foundBlock) {
                const startHex = foundBlock.start.toString(16).toUpperCase().padStart(4, '0');
                const endHex = foundBlock.end.toString(16).toUpperCase().padStart(4, '0');
                dropdownTitle.textContent = `${foundBlock.name} (U+${startHex} - U+${endHex})`;
                
                currentBlock = foundBlock;
                currentPageIndex = Math.floor((targetCodePoint - foundBlock.start) / PAGE_SIZE);
                renderKeyboard(); 
                
                searchMessageSpan.textContent = '';
            } else {
                searchMessageSpan.textContent = `Not found.`;
                setTimeout(() => { searchMessageSpan.textContent = ""; }, 3000);
                currentSearchedCodePoint = null; 
                if (highlightedKeyElement) {
                    highlightedKeyElement.classList.remove('highlighted');
                    highlightedKeyElement = null;
                }
            }
        }

        charSearchButton.addEventListener('click', performSearch);
        charSearchInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                performSearch();
            }
        });

        renderDropdownList();
        if (unicodeBlocks.length > 0) {
            const defaultIndex = unicodeBlocks.findIndex(b => b.name.includes("基本ラテン文字")) !== -1 
                ? unicodeBlocks.findIndex(b => b.name.includes("基本ラテン文字")) : 0;
            currentBlock = unicodeBlocks[defaultIndex];
            currentPageIndex = 0;
            currentSearchedCodePoint = null; 
            
            const startHex = currentBlock.start.toString(16).toUpperCase().padStart(4, '0');
            const endHex = currentBlock.end.toString(16).toUpperCase().padStart(4, '0');
            dropdownTitle.textContent = `${currentBlock.name} (U+${startHex} - U+${endHex})`;
            
            renderKeyboard();
        }
    </script>
