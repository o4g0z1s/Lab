<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let ripples = [];
    let isDragging = false;
    let lastRippleTime = 0;
    
    const RIPPLE_INTERVAL = 100; // 1秒間に10個
    const EXPANSION_SPEED = 12;  // 広がる速さ
    const FADE_SPEED = 0.001;    // 消えていく速さ（小さくすると長く残る）
    const LINE_WIDTH = 1.2;      // 線の細さ

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Ripple {
        constructor(x, y) {
            this.originX = x;
            this.originY = y;
            this.r = 1; 
            this.opacity = 1.0;
            this.alive = true;
        }

        update() {
            this.r += EXPANSION_SPEED;
            this.opacity -= FADE_SPEED;
            if (this.opacity <= 0) {
                this.alive = false;
            }
        }

        draw() {
            if (!this.alive) return;

            ctx.lineWidth = LINE_WIDTH;
            ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;

            const w = canvas.width;
            const h = canvas.height;

            // X方向とY方向で、画面内に影響を与える鏡像の中心点を計算
            const getMirrors = (pos, size, radius) => {
                const mirrors = [];
                // 半径の届く範囲にある鏡像のインデックス範囲を算出
                const range = Math.ceil((radius + size) / (size * 2));
                for (let i = -range; i <= range; i++) {
                    // 偶数番目の鏡像は pos + 2*i*size
                    mirrors.push(2 * i * size + pos);
                    // 奇数番目の鏡像（反転）は 2*i*size - pos
                    mirrors.push(2 * i * size - pos);
                }
                return mirrors;
            };

            const mirrorsX = getMirrors(this.originX, w, this.r);
            const mirrorsY = getMirrors(this.originY, h, this.r);

            ctx.beginPath();
            for (let cx of mirrorsX) {
                for (let cy of mirrorsY) {
                    // 鏡像の中心点が画面から離れすぎていないか簡易チェック（描画負荷軽減）
                    // 円のどこかが画面内(0, 0, w, h)に入る可能性がある場合のみ描画
                    const distSq = Math.pow(Math.max(0, -cx, cx - w), 2) + 
                                   Math.pow(Math.max(0, -cy, cy - h), 2);
                    
                    if (distSq <= this.r * this.r) {
                        // 1つのパスとして円を描画
                        ctx.moveTo(cx + this.r, cy);
                        ctx.arc(cx, cy, this.r, 0, Math.PI * 2);
                    }
                }
            }
            ctx.stroke();
        }
    }

    function createRipple(x, y) {
        ripples.push(new Ripple(x, y));
    }

    // イベント処理
    function handleStart(e) {
        isDragging = true;
        const pos = getPos(e);
        createRipple(pos.x, pos.y);
        lastRippleTime = Date.now();
    }

    function handleMove(e) {
        if (!isDragging) return;
        const now = Date.now();
        if (now - lastRippleTime >= RIPPLE_INTERVAL) {
            const pos = getPos(e);
            createRipple(pos.x, pos.y);
            lastRippleTime = now;
        }
    }

    function handleEnd() {
        isDragging = false;
    }

    function getPos(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX, y: clientY };
    }

    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, { passive: false });
    window.addEventListener('touchmove', (e) => { handleMove(e); }, { passive: false });
    window.addEventListener('touchend', handleEnd);

    function animate() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 波紋の更新と描画
        for (let i = ripples.length - 1; i >= 0; i--) {
            ripples[i].update();
            if (ripples[i].alive) {
                ripples[i].draw();
            } else {
                ripples.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
