<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忢</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        const baseSpeed = 3;
        const speeds = [baseSpeed, baseSpeed * 1.5, baseSpeed * 2];
        const points = [];
        let isPaused = false;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') isPaused = !isPaused;
        });
        resize();

        for (let i = 0; i < 3; i++) {
            const angle = Math.random() * Math.PI * 2;
            const s = speeds[i];
            points.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: Math.cos(angle) * s,
                vy: Math.sin(angle) * s
            });
        }

        function getDistance(p1, p2) {
            return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
        }

        function getTriangleArea(a, b, c) {
            return Math.abs((a.x * (b.y - c.y) + b.x * (c.y - a.y) + c.x * (a.y - b.y)) / 2);
        }

        function limit(val) {
            const max = 10000;
            return Math.max(-max, Math.min(max, val));
        }

        function draw() {
            if (!isPaused) {
                points.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x <= 0 || p.x >= width) p.vx *= -1;
                    if (p.y <= 0 || p.y >= height) p.vy *= -1;
                    p.x = Math.max(0, Math.min(width, p.x));
                    p.y = Math.max(0, Math.min(height, p.y));
                });
            }

            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, height);

            const [p1, p2, p3] = points;
            const a = getDistance(p2, p3);
            const b = getDistance(p1, p3);
            const c = getDistance(p1, p2);
            const perimeter = a + b + c;
            const area = getTriangleArea(p1, p2, p3);

            if (area < 0.1) {
                requestAnimationFrame(draw);
                return;
            }

            ctx.strokeStyle = 'white';
            ctx.fillStyle = 'white';
            ctx.lineWidth = 1;

            // 三角形の描画
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.lineTo(p3.x, p3.y);
            ctx.closePath();
            ctx.stroke();

            // 辺の延長線
            ctx.save();
            ctx.setLineDash([5, 5]);
            ctx.globalAlpha = 0.4;
            [[p1, p2], [p2, p3], [p3, p1]].forEach(([v1, v2]) => {
                const dx = v2.x - v1.x;
                const dy = v2.y - v1.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                const ux = dx / d;
                const uy = dy / d;
                const len = Math.max(width, height) * 2;
                ctx.beginPath();
                ctx.moveTo(v1.x - ux * len, v1.y - uy * len);
                ctx.lineTo(v2.x + ux * len, v2.y + uy * len);
                ctx.stroke();
            });
            ctx.restore();

            // 中心座標計算
            const gx = (p1.x + p2.x + p3.x) / 3;
            const gy = (p1.y + p2.y + p3.y) / 3;

            const ix = (a * p1.x + b * p2.x + c * p3.x) / perimeter;
            const iy = (a * p1.y + b * p2.y + c * p3.y) / perimeter;
            const inRadius = (2 * area) / perimeter;

            const D = 2 * (p1.x * (p2.y - p3.y) + p2.x * (p3.y - p1.y) + p3.x * (p1.y - p2.y));
            const ox = limit(((p1.x ** 2 + p1.y ** 2) * (p2.y - p3.y) + (p2.x ** 2 + p2.y ** 2) * (p3.y - p1.y) + (p3.x ** 2 + p3.y ** 2) * (p1.y - p2.y)) / D);
            const oy = limit(((p1.x ** 2 + p1.y ** 2) * (p3.x - p2.x) + (p2.x ** 2 + p2.y ** 2) * (p1.x - p3.x) + (p3.x ** 2 + p3.y ** 2) * (p2.x - p1.x)) / D);
            const outRadius = (a * b * c) / (4 * area);

            const hx = limit(3 * gx - 2 * ox);
            const hy = limit(3 * gy - 2 * oy);

            const e1x = limit((-a * p1.x + b * p2.x + c * p3.x) / (-a + b + c));
            const e1y = limit((-a * p1.y + b * p2.y + c * p3.y) / (-a + b + c));
            const e1r = 2 * area / Math.abs(-a + b + c);

            const e2x = limit((a * p1.x - b * p2.x + c * p3.x) / (a - b + c));
            const e2y = limit((a * p1.y - b * p2.y + c * p3.y) / (a - b + c));
            const e2r = 2 * area / Math.abs(a - b + c);

            const e3x = limit((a * p1.x + b * p2.x - c * p3.x) / (a + b - c));
            const e3y = limit((a * p1.y + b * p2.y - c * p3.y) / (a + b - c));
            const e3r = 2 * area / Math.abs(a + b - c);

            // 補助線
            ctx.save();
            ctx.setLineDash([5, 5]);
            ctx.globalAlpha = 0.4;

            // 中線
            [[p1, p2, p3], [p2, p1, p3], [p3, p1, p2]].forEach(([v, n1, n2]) => {
                ctx.beginPath(); ctx.moveTo(v.x, v.y); ctx.lineTo((n1.x + n2.x) / 2, (n1.y + n2.y) / 2); ctx.stroke();
            });

            // 角の二等分線
            [[p1, e1x, e1y], [p2, e2x, e2y], [p3, e3x, e3y]].forEach(([v, ex, ey]) => {
                ctx.beginPath(); ctx.moveTo(v.x, v.y); ctx.lineTo(ex, ey); ctx.stroke();
            });

            // 垂直二等分線
            [[p1, p2], [p2, p3], [p3, p1]].forEach(([n1, n2]) => {
                ctx.beginPath(); ctx.moveTo((n1.x + n2.x) / 2, (n1.y + n2.y) / 2); ctx.lineTo(ox, oy); ctx.stroke();
            });

            // 垂線
            [p1, p2, p3].forEach(v => {
                ctx.beginPath(); ctx.moveTo(v.x, v.y); ctx.lineTo(hx, hy); ctx.stroke();
            });
            ctx.restore();

            // 円
            ctx.beginPath(); ctx.arc(ix, iy, inRadius, 0, Math.PI * 2); ctx.stroke();
            [ {x: e1x, y: e1y, r: e1r}, {x: e2x, y: e2y, r: e2r}, {x: e3x, y: e3y, r: e3r} ].forEach(e => {
                if (e.r < 5000) { ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.stroke(); }
            });
            if (outRadius < 5000) { ctx.beginPath(); ctx.arc(ox, oy, outRadius, 0, Math.PI * 2); ctx.stroke(); }

            // 点
            [p1, p2, p3].forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill(); });
            [ {x: gx, y: gy}, {x: ix, y: iy}, {x: ox, y: oy}, {x: hx, y: hy}, {x: e1x, y: e1y}, {x: e2x, y: e2y}, {x: e3x, y: e3y} ].forEach(c => {
                ctx.beginPath(); ctx.arc(c.x, c.y, 3, 0, Math.PI * 2); ctx.fill();
            });

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
